<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand Vibes</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* HERO */
.hero {
  height: 100vh;
  background-image: url("/beach.png");
  background-size: cover;
  background-position: center;
  position: relative;
}

/* DARK OVERLAY */
.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
}

/* CONTENT */
.content {
  position: relative;
  z-index: 2;
  color: white;
  max-width: 900px;
  padding: 40px 20px;
  margin: auto;
  text-align: center;
}

/* LOGO */
.logo {
  width: 320px;
  margin-bottom: 20px;
}

/* HEADLINE */
h1 {
  font-size: 48px;
  margin-bottom: 10px;
  font-weight: 800;
  line-height: 1.2;
}

/* SUBLINE */
.sub {
  font-size: 22px;
  margin-bottom: 25px;
  color: #f1f1f1;
  font-style: italic;
}

/* LIST */
.list p {
  margin: 6px 0;
  font-size: 18px;
}

/* MAIN BUTTON */
.btn-main {
  display: inline-block;
  margin-top: 25px;
  padding: 18px 40px;
  background: linear-gradient(135deg, #ff9800, #ff3d00);
  color: white;
  text-decoration: none;
  border-radius: 50px;
  font-size: 20px;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.btn-main:hover {
  transform: scale(1.08);
}

/* SMALL BUTTONS */
.btn-small {
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 15px;
  font-weight: 500;
  text-decoration: none;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.btn-small:hover {
  transform: scale(1.08);
}

/* COLORS */
.coffee {
  background: linear-gradient(135deg, #ffb347, #ff9800);
}

.tiktok {
  background: linear-gradient(135deg, #111111, #333333);
}

/* MOBILE */
@media (max-width: 768px) {
  .logo {
    width: 220px;
  }

  h1 {
    font-size: 32px;
  }

  .sub {
    font-size: 18px;
  }
}
</style>

</head>

<body>

<div class="hero">

<div class="content">

<img src="Chang1.png" class="logo">

<h1>🇹🇭 Auswandern nach Thailand –<br>mein Weg ohne großen Plan</h1>

<div class="sub">
Die Wahrheit, die dir niemand sagt.
</div>

<div class="list">
<p>✔️ Ohne Fake</p>
<p>✔️ Ohne Luxus</p>
<p>✔️ Nur echte Erfahrungen</p>
</div>

<a href="ebook.html" class="btn-main">
🚀 Jetzt starten – E-Book ansehen
</a>

<div>
<a href="https://buymeacoffee.com/changlife" target="_blank" class="btn-small coffee">
☕ Buy Me a Coffee
</a>

<a href="https://www.tiktok.com/@changronnythai" target="_blank" class="btn-small tiktok">
📱 TikTok
</a>
</div>

</div>

</div>

</body>
</html>
